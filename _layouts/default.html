<!DOCTYPE html>
<html lang="ko">
<head>
    {% include head.html %}
    {% if page.extra_css %}{{ page.extra_css }}{% endif %}
</head>
<body>
<div class="formula-bg" id="formulaBg"></div>

{% include sidebar.html %}
{% include market-widget.html %}

<div class="main-wrapper">
    <div class="container">
        {% include breadcrumb.html %}
        {{ content }}
    </div>
    <footer class="layout-footer">
        <p>&copy; 2026 Ha Rim Jung &middot; <a href="mailto:gkfla2020@gmail.com">gkfla2020@gmail.com</a> &middot; <a href="https://github.com/gkfla2020-bit">GitHub</a></p>
    </footer>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
    /* Formula background */
    var syms=['Σ','∫','∂','√','∞','π','θ','σ','μ','λ','α','β','γ','δ','Δ','Γ','κ','ρ','φ','ψ','dx','dt','dW','E[X]','Var','ln','exp'];
    var bg=document.getElementById('formulaBg');
    if(!bg) return;
    var items=[];
    for(var i=0;i<25;i++){
        var el=document.createElement('div');
        el.className='f';
        el.textContent=syms[Math.floor(Math.random()*syms.length)];
        el.style.fontSize=(14+Math.random()*18)+'px';
        el.style.color='rgba(128,128,128,'+(0.04+Math.random()*0.04)+')';
        el.style.left=Math.random()*100+'%';
        el.style.top=Math.random()*100+'%';
        bg.appendChild(el);
        items.push({el:el,x:parseFloat(el.style.left),y:parseFloat(el.style.top),vx:(Math.random()-.5)*.02,vy:(Math.random()-.5)*.02});
    }
    var mx=-1000,my=-1000;
    document.addEventListener('mousemove',function(e){mx=(e.clientX/window.innerWidth)*100;my=(e.clientY/window.innerHeight)*100;});

    var formulaRunning=true;
    function tick(){
        if(!formulaRunning)return;
        for(var j=0;j<items.length;j++){
            var it=items[j];
            it.x+=it.vx;it.y+=it.vy;
            if(it.x<0||it.x>100)it.vx*=-1;
            if(it.y<0||it.y>100)it.vy*=-1;
            var dx=it.x-mx,dy=it.y-my,dist=Math.sqrt(dx*dx+dy*dy);
            var px=0,py=0;
            if(dist<12){var f=(12-dist)/12*3;px=(dx/dist)*f;py=(dy/dist)*f;}
            it.el.style.left=(it.x+px)+'%';
            it.el.style.top=(it.y+py)+'%';
        }
        requestAnimationFrame(tick);
    }
    tick();

    /* Pause formula animation when not visible */
    var observer=new IntersectionObserver(function(entries){
        formulaRunning=entries[0].isIntersecting;
        if(formulaRunning) tick();
    },{threshold:0});
    observer.observe(bg);
});
</script>
{% include market-data.html %}
</body>
</html>
