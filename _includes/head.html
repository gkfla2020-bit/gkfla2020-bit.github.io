<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

<!-- Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x03C3;</text></svg>">

<!-- SEO -->
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Quantitative Researcher — Interest rate modeling, portfolio optimization, and quantitative trading strategies.{% endif %}">
<link rel="canonical" href="{{ site.url }}{{ page.url | replace: 'index.html', '' }}">

<!-- Open Graph -->
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}Quantitative Researcher — Interest rate modeling, portfolio optimization, and quantitative trading strategies.{% endif %}">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta property="og:image" content="{{ site.url }}/assets/og-card.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="Ha Rim Jung">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ site.url }}/assets/og-card.png">
<meta property="kakao:image" content="{{ site.url }}/assets/og-card.png">

<!-- Structured Data: Person -->
{% if page.url == '/' or page.url == '/index.html' %}
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"Person","name":"Ha Rim Jung","url":"{{ site.url }}","jobTitle":"Quantitative Researcher","affiliation":{"@type":"Organization","name":"Sogang University"},"sameAs":["https://github.com/gkfla2020-bit"]}
</script>
{% endif %}

<!-- Structured Data: Article -->
{% if page.layout == 'post' or page.date %}
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"Article","headline":"{{ page.title | escape }}","datePublished":"{{ page.date | date_to_xmlschema }}","author":{"@type":"Person","name":"Ha Rim Jung"},"publisher":{"@type":"Person","name":"Ha Rim Jung"},"url":"{{ site.url }}{{ page.url }}"}
</script>
{% endif %}

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-83LKVW7412"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-83LKVW7412');</script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Inter:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Inter:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet"></noscript>

<!-- OG Image Preload -->
<link rel="preload" as="image" href="/assets/og-card.png">

<!-- Unified CSS -->
<link rel="stylesheet" href="/assets/css/main.css">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>
{% if page.plotly %}<script src="https://cdn.plot.ly/plotly-2.27.0.min.js" defer></script>{% endif %}
