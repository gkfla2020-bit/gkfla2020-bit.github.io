<aside class="right-sidebar" role="complementary" aria-label="Market data">
    <div class="widget-section" aria-live="polite">
        <div class="widget-title">Market Overview</div>
        <div class="market-group">
            <div class="market-group-title">Indices</div>
            <div class="market-item"><span class="market-name">KOSPI</span><div><span class="market-value" id="kospi" aria-label="KOSPI index value">-</span><span class="market-change" id="kospi-chg" aria-label="KOSPI change">-</span></div></div>
            <div class="market-item"><span class="market-name">S&amp;P 500</span><div><span class="market-value" id="sp500" aria-label="S&P 500 index value">-</span><span class="market-change" id="sp500-chg" aria-label="S&P 500 change">-</span></div></div>
            <div class="market-item"><span class="market-name">NASDAQ</span><div><span class="market-value" id="nasdaq" aria-label="NASDAQ index value">-</span><span class="market-change" id="nasdaq-chg" aria-label="NASDAQ change">-</span></div></div>
        </div>
        <div class="market-group">
            <div class="market-group-title">Rates &amp; FX</div>
            <div class="market-item"><span class="market-name">US 10Y</span><div><span class="market-value" id="us10y" aria-label="US 10-year yield">-</span><span class="market-change" id="us10y-chg" aria-label="US 10Y change">-</span></div></div>
            <div class="market-item"><span class="market-name">USD/KRW</span><div><span class="market-value" id="usdkrw" aria-label="USD/KRW exchange rate">-</span><span class="market-change" id="usdkrw-chg" aria-label="USD/KRW change">-</span></div></div>
        </div>
        <div class="market-group">
            <div class="market-group-title">Volatility</div>
            <div class="market-item"><span class="market-name">VIX</span><div><span class="market-value" id="vix" aria-label="VIX index">-</span><span class="market-change" id="vix-chg" aria-label="VIX change">-</span></div></div>

        </div>
        <div class="market-group">
            <div class="market-group-title">Crypto</div>
            <div class="market-item"><span class="market-name">BTC</span><div><span class="market-value" id="btc" aria-label="Bitcoin price">-</span><span class="market-change" id="btc-chg" aria-label="Bitcoin change">-</span></div></div>
        </div>
        <div class="widget-update" id="update-time">Loading...</div>
    </div>
    <div class="widget-section" style="margin-top:20px;">
        <div class="widget-title">Guestbook &#x1F4DD;</div>
        <div class="giscus-container" id="giscus-desktop" style="max-height:400px;overflow-y:auto;"></div>
    </div>
</aside>
