<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ERC Portfolio — Slide Deck</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;overflow:hidden;height:100vh;font-family:sans-serif}
.slide{position:absolute;top:0;left:0;width:100vw;height:100vh;display:none;align-items:center;justify-content:center;background:#fff}
.slide.active{display:flex}
.slide img{max-width:100vw;max-height:100vh;object-fit:contain}
.num{position:fixed;bottom:16px;right:24px;color:#999;font-size:13px;z-index:10;background:rgba(0,0,0,.5);padding:4px 12px;border-radius:20px}
.prog{position:fixed;top:0;left:0;height:3px;background:#333;z-index:100;transition:width .3s}
.hint{position:fixed;bottom:16px;left:24px;color:#666;font-size:11px;z-index:10}
</style></head><body>
<div class="prog" id="p"></div>
<div class="num" id="n"></div>
<div class="hint">← → 이동 · F 전체화면 · Home/End 처음/끝</div>
</body>
<script>
const T=25;
let c=0;
const body=document.body;
for(let i=1;i<=T;i++){
  const d=document.createElement('div');
  d.className='slide'+(i===1?' active':'');
  d.innerHTML='<img src="slide_'+String(i).padStart(2,'0')+'.png" alt="Slide '+i+'">';
  body.appendChild(d);
}
const slides=document.querySelectorAll('.slide');
const prog=document.getElementById('p');
const num=document.getElementById('n');
function go(i){
  if(i<0||i>=T)return;
  slides[c].classList.remove('active');
  c=i;
  slides[c].classList.add('active');
  prog.style.width=((c+1)/T*100)+'%';
  num.textContent=(c+1)+' / '+T;
}
go(0);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')go(c+1);
  else if(e.key==='ArrowLeft')go(c-1);
  else if(e.key==='Home')go(0);
  else if(e.key==='End')go(T-1);
  else if(e.key==='f'||e.key==='F'){
    if(!document.fullscreenElement)document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(dx<-50)go(c+1);else if(dx>50)go(c-1);
});
document.addEventListener('click',e=>{
  if(e.clientX>window.innerWidth*.6)go(c+1);
  else if(e.clientX<window.innerWidth*.4)go(c-1);
});
</script></html>
