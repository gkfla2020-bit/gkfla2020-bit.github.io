# Site Settings
title: Ha Rim Jung
description: Quantitative Researcher | Sogang University
url: "https://gkfla2020-bit.github.io"
baseurl: ""

# Author
author:
  name: Ha Rim Jung
  email: gkfla2020@gmail.com
  github: gkfla2020-bit

# API Keys (set via environment variable FINNHUB_KEY, or GitHub Actions secret)
finnhub_key: ""

# Build Settings
markdown: kramdown
highlighter: rouge
future: true
permalink: /blog/:title/

# Exclude from Jekyll processing (demos are standalone static builds)
exclude:
  - asset-comovement-research
  - research-editor
  - _insert_develop.py
  - _develop_insert.html
  - _live_test.txt
  - Gemfile
  - Gemfile.lock
  - vendor

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

include:
  - _pages

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
